server:
  port: 3532

spring:
  application:
    name: stock-service
  datasource:
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      jakarta.persistence.lock.timeout: 3000

